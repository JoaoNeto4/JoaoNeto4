name: "Conventional Commits Stats"

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Commit Chart
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_REGISTRY_TOKEN }}
          base: header, activity, community, repositories
          
          # Plugins válidos confirmados pelo seu log de erro:
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_lines: yes
