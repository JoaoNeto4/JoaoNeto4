name: "Conventional Commits Stats"

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Commit Chart
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_REGISTRY_TOKEN }}
          base: ""
          plugin_posts: yes
          plugin_posts_source: dev.to
          # Substituindo o plugin_commits (que não existe) pelo plugin_habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
