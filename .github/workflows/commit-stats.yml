name: "Conventional Commits Stats"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Commit Chart
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_REPOSITORY_METRICS }}
          base: header, activity, community, repositories
          
          # Mantém o gráfico de linguagens que funcionou bem
          plugin_languages: yes
          plugin_languages_sections: most-used
          
          # ATIVAÇÃO DO FILTRO DE CONVENTIONAL COMMITS
          plugin_commits: yes
          plugin_commits_sections: detail
          # Filtra e agrupa no gráfico exatamente pelas suas tags:
          plugin_commits_search: "feat:, fix:, docs:, style:, refactor:, perf:, test:, build:, ci:, chore:, revert:"
