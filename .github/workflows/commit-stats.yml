name: "Conventional Commits Stats"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Commit Chart
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_REPOSITORY_METRICS }}
          
          # 1. Ativa apenas o bloco essencial da conta do usuário (For user accounts)
          base: header, activity, community, repositories
          
          # 2. Ativa o bloco detalhado de linguagens (Languages activity)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage # Mostra o tamanho em bytes e %
          
          # Garante que nenhum outro plugin antigo interfira no layout
          plugin_lines: no
          plugin_habits: no
          plugin_commits: no
